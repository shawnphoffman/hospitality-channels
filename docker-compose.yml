services:
  web:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.web
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - app-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.worker
    environment:
      - WEB_URL=http://web:3000
    volumes:
      - app-data:/data
      - exports:/exports
    restart: unless-stopped
    depends_on:
      web:
        condition: service_started

volumes:
  app-data:
  exports:
    driver: local
