name: Build and Publish Docker Image

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.github/FUNDING.yml'
      - '.vscode/**'
      - '.claude/**'
      - '.cursor/**'
      - '.editorconfig'
      - '.env.example'
      - '.nvmrc'
      - 'docs/**'
      - 'docker-compose*.yml'
      - '*.png'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - target: runner
            suffix: ''
            description: 'Hospitality TV channel management — minimal fonts (Latin/common scripts)'
          - target: runner-fonts
            suffix: '-fonts'
            description: 'Hospitality TV channel management — full Unicode fonts (emoji, CJK, symbols)'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,suffix=${{ matrix.suffix }}
            type=raw,value=latest${{ matrix.suffix }}
          labels: |
            org.opencontainers.image.title=hospitality-channels${{ matrix.suffix || '' }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
