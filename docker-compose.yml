# =================================================================
# Example docker-compose.yml
#
# Adjust volumes, ports, and network settings to match your setup.
# The unified Dockerfile runs both the web server and worker in a
# single container.
#
# Build targets (set via DOCKER_TARGET env var or override below):
#   runner       — default, minimal fonts (Latin/common scripts)
#   runner-fonts — full Unicode coverage (emoji, CJK, symbols)
# =================================================================

services:
  hospitality-channels:
    image: ghcr.io/YOUR_ORG/hospitality-channels:latest
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile
      target: ${DOCKER_TARGET:-runner}
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    volumes:
      # Application data (SQLite database, assets, etc.)
      - app-data:/data
      # Media export directory — mount wherever Tunarr can read from
      - exports:/exports
      # Optional: mount a host path if Tunarr reads from a local directory
      # - /path/to/media:/library-local:rw
    environment:
      - TZ=${TZ:-UTC}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}

volumes:
  app-data:
  exports:
