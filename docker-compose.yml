# =================================================================
# Example docker-compose.yml
#
# Adjust volumes, ports, and network settings to match your setup.
# The unified Dockerfile runs both the web server and worker in a
# single container.
#
# Image variants:
#   :latest       — default, minimal fonts (Latin/common scripts)
#   :latest-fonts — full Unicode coverage (emoji, CJK, symbols)
# =================================================================

services:
  hospitality-channels:
    image: ghcr.io/YOUR_ORG/hospitality-channels:latest
    # For full Unicode/emoji/CJK font support, use the -fonts variant:
    # image: ghcr.io/YOUR_ORG/hospitality-channels:latest-fonts
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    volumes:
      # Application data (SQLite database, assets, etc.)
      - app-data:/data
      # Media export directory — mount wherever Tunarr can read from
      - exports:/exports
      # Optional: mount a host path if Tunarr reads from a local directory
      # - /path/to/media:/library-local:rw
    environment:
      - TZ=${TZ:-UTC}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      # Number of clips to render in parallel within a program render.
      # Default 2. Lower to 1 on memory-constrained hosts; raise for more cores.
      # - WORKER_RENDER_CONCURRENCY=2
      # Times a render/publish job is attempted before it is marked failed. Default 2.
      # - WORKER_JOB_MAX_ATTEMPTS=2
      # Worker download guards for remote audio/video assets. Defaults: 120s, 1 GiB.
      # - ASSET_FETCH_TIMEOUT_MS=120000
      # - ASSET_FETCH_MAX_BYTES=1073741824
      # Max size of a single asset upload through the web UI. Default 1 GiB.
      # - MAX_UPLOAD_BYTES=1073741824

volumes:
  app-data:
  exports:
