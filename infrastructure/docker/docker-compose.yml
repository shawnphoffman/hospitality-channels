version: "3.8"

services:
  web:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=/data/guest-tv-pages.db
      - ASSET_STORAGE_PATH=/data/assets
      - EXPORT_PATH=/data/exports
    volumes:
      - app-data:/data
      - exports:/data/exports
    restart: unless-stopped

  worker:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.worker
    environment:
      - NODE_ENV=production
      - DATABASE_URL=/data/guest-tv-pages.db
      - ASSET_STORAGE_PATH=/data/assets
      - EXPORT_PATH=/data/exports
    volumes:
      - app-data:/data
      - exports:/data/exports
    restart: unless-stopped
    depends_on:
      - web

volumes:
  app-data:
  exports:
    driver: local
