services:
  web:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=/data/guest-tv-pages.db
      - ASSET_STORAGE_PATH=/data/assets
      - EXPORT_PATH=/data/exports
    volumes:
      - app-data:/data
      - exports:/data/exports
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  worker:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.worker
    environment:
      - NODE_ENV=production
      - DATABASE_URL=/data/guest-tv-pages.db
      - ASSET_STORAGE_PATH=/data/assets
      - EXPORT_PATH=/data/exports
      - RENDER_OUTPUT_DIR=/data/renders
      - WEB_URL=http://web:3000
    volumes:
      - app-data:/data
      - exports:/data/exports
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy

volumes:
  app-data:
  exports:
    driver: local
