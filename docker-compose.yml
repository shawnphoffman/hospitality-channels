x-common: &common
  restart: unless-stopped
  environment: &env
    TZ: America/Los_Angeles
    PUID: 1000
    PGID: 1000
  networks:
    - proxy_net
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: 3

x-health: &health
  interval: 5m
  timeout: 10s
  retries: 5
  start_period: 1m

# =================================================================
networks:
  proxy_net:
    external: true

# =================================================================
services:
  web:
    <<: *common
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.web
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - app-data:/data
    environment:
      <<: *env
    # ================================
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      <<: *health

  worker:
    <<: *common
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.worker
    environment:
      <<: *env
      WEB_URL: http://web:3000
    volumes:
      - app-data:/data
      - exports:/exports
    depends_on:
      web:
        condition: service_started

volumes:
  app-data:
  exports:
    driver: local
